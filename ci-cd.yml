name: Halal Bite CI/CD Pipeline

# =====================================================
# Triggers:
#   - Push to main → build + test + Docker push
#   - Push to develop → build + test only
#   - Pull request → build + test only
# =====================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/halal-bite

jobs:

  # ===================================================
  # JOB 1: Test all microservices
  # ===================================================
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - notification-service
          - api-gateway
          - service-registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd backend/${{ matrix.service }}
          mvn test -q
        env:
          SPRING_PROFILES_ACTIVE: test

  # ===================================================
  # JOB 2: Build and push Docker images
  # Only runs on push to main after tests pass
  # ===================================================
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - notification-service
          - api-gateway
          - service-registry

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================================================
  # JOB 3: Build frontend apps
  # ===================================================
  build-frontend:
    name: Build frontend apps
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/admin-portal/package-lock.json
            frontend/customer-app/package-lock.json

      - name: Build admin portal
        run: |
          cd frontend/admin-portal
          npm ci
          npm run build

      - name: Build customer app
        run: |
          cd frontend/customer-app
          npm ci
          npx expo export --platform web

      - name: Build restaurant dashboard
        run: |
          cd frontend/restaurant-dashboard
          npm ci
          npm run build
