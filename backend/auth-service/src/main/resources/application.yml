server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/user_service_db
    username: halalbiteuser
    password: halalbitepass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# =====================================================
# JWT Configuration
# =====================================================
# secret: must be at least 32 characters long
# This SAME secret must be used in user-service and
# restaurant-service to validate tokens.
# In production: use a long random string and store
# it in environment variables, never hardcode it.
# =====================================================
jwt:
  secret: halal-bite-super-secret-jwt-key-2026-production
  expiration-ms: 86400000   # 24 hours in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.halalbite.authservice: DEBUG
