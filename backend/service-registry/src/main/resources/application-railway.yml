# application-railway.yml for SERVICE-REGISTRY ONLY
# Eureka does not need database or Kafka

spring:
  application:
    name: service-registry

server:
  port: ${PORT:8761}

eureka:
  instance:
    hostname: ${RAILWAY_PUBLIC_DOMAIN:localhost}
    non-secure-port: 443
    secure-port: 443
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/actuator/info
    health-check-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/actuator/health
    home-page-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always