# =====================================================
# application-railway.yml
# Spring profile for Railway.com deployment
#
# Copy this file into EACH service's src/main/resources/
# backend/{service}/src/main/resources/application-railway.yml
#
# Railway provides these env vars automatically:
#   RAILWAY_PUBLIC_DOMAIN - public URL of this service
#   PORT - the port Railway assigns (use SERVER_PORT)
# =====================================================

spring:
  application:
    name: api-gateway

server:
  port: ${PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: ${RAILWAY_PUBLIC_DOMAIN:localhost}
    non-secure-port: 443
    secure-port: 443
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/actuator/info
    health-check-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/actuator/health
    home-page-url: https://${RAILWAY_PUBLIC_DOMAIN:localhost}/

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
