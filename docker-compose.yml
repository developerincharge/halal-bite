# ============================================================
# HALAL-BITE — Local Development Docker Compose
# ============================================================
# Kafka uses KRaft mode (bitnami/kafka:3.7.0) — NO Zookeeper!
#
# Start infrastructure:
#   docker compose up -d postgres redis kafka kafka-ui keycloak
#
# Check status:       docker compose ps
# Stop (keeps data):  docker compose down
# Full reset:         docker compose down -v
# Watch logs:         docker compose logs -f kafka
# ============================================================

networks:
  halal-bite-network:
    driver: bridge
    name: halal-bite-network

volumes:
  postgres-data:
    name: halal-bite-postgres-data
  redis-data:
    name: halal-bite-redis-data
  kafka-data:
    name: halal-bite-kafka-data

services:

  # ----------------------------------------------------------
  # PostgreSQL — port 5432
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: halal-bite-postgres
    networks:
      - halal-bite-network
    restart: unless-stopped
    environment:
      POSTGRES_USER: halalbiteuser
      POSTGRES_PASSWORD: halalbitepass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halalbiteuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Redis — port 6379
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: halal-bite-redis
    networks:
      - halal-bite-network
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-halalbiteRedis123}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-halalbiteRedis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Kafka 3.7.0 — KRaft mode, NO Zookeeper needed
  # Port: 9092 (between containers), 29092 (your machine)
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.1
    container_name: halal-bite-kafka
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Kafka UI — http://localhost:8090
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: halal-bite-kafka-ui
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: halal-bite-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ----------------------------------------------------------
  # Keycloak — http://localhost:8180
  # Admin login: admin / admin  (local dev only!)
  # ----------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: halal-bite-keycloak
    networks:
      - halal-bite-network
    restart: unless-stopped
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-halalbiteuser}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-halalbitepass}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

