# ============================================================
# HALAL-BITE — Local Development Docker Compose
# ============================================================
# Kafka uses KRaft mode (bitnami/kafka:3.7.0) — NO Zookeeper!
#
# Start infrastructure:
#   docker compose up -d postgres redis kafka kafka-ui keycloak
#
# Check status:       docker compose ps
# Stop (keeps data):  docker compose down
# Full reset:         docker compose down -v
# Watch logs:         docker compose logs -f kafka
# ============================================================

version: '3.8'

# =====================================================
# Halal Bite — Complete Docker Compose
# Starts the entire platform with one command:
#   docker-compose up -d
#
# Startup order:
#   1. Infrastructure (postgres, redis, kafka)
#   2. service-registry (Eureka)
#   3. auth-service, user-service (no inter-service deps)
#   4. restaurant-service, menu-service
#   5. order-service, payment-service, notification-service
#   6. api-gateway (last — needs all services registered)
# =====================================================

services:

  # ===================================================
  # INFRASTRUCTURE
  # ===================================================

  postgres:
    image: postgres:16-alpine
    container_name: halal-bite-postgres
    networks:
      - halal-bite-network
    restart: unless-stopped
    environment:
      POSTGRES_USER: halalbiteuser
      POSTGRES_PASSWORD: halalbitepass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U halalbiteuser" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: halal-bite-redis
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.1
    container_name: halal-bite-kafka
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: halal-bite-kafka-ui
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: halal-bite
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

    # ===================================================
    # SPRING BOOT MICROSERVICES
    # ===================================================

  service-registry:
    build:
      context: ./backend/service-registry
      dockerfile: Dockerfile
    image: halal-bite/service-registry:latest
    container_name: halal-bite-service-registry
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    image: halal-bite/auth-service:latest
    container_name: halal-bite-auth-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    image: halal-bite/user-service:latest
    container_name: halal-bite-user-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  restaurant-service:
    build:
      context: ./backend/restaurant-service
      dockerfile: Dockerfile
    image: halal-bite/restaurant-service:latest
    container_name: halal-bite-restaurant-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurant_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  menu-service:
    build:
      context: ./backend/menu-service
      dockerfile: Dockerfile
    image: halal-bite/menu-service:latest
    container_name: halal-bite-menu-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/menu_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    image: halal-bite/order-service:latest
    container_name: halal-bite-order-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    image: halal-bite/payment-service:latest
    container_name: halal-bite-payment-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
      PAYPAL_CLIENT_ID: AeFri9XLazx-1X5dJ1eBOctKJqVzQMd_RRkuCTBhy2jnvV2AvESgR_Fz8Z__M6VxS9r8e00_8kXHifU6
      PAYPAL_CLIENT_SECRET: ELuq6tKtK6eX-7VtdHaY107jfbXRKW6w0QfSJCSBbzTQRZqq7QJ4SKbMDvrS-GtdpCN-o-AZZrbSlbOv
      PAYPAL_MODE: sandbox
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    image: halal-bite/notification-service:latest
    container_name: halal-bite-notification-service
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_service_db
      SPRING_DATASOURCE_USERNAME: halalbiteuser
      SPRING_DATASOURCE_PASSWORD: halalbitepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8087/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    image: halal-bite/api-gateway:latest
    container_name: halal-bite-api-gateway
    networks:
      - halal-bite-network
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: halal-bite-super-secret-jwt-key-2026-production
    depends_on:
      service-registry:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

# ===================================================
# NETWORKS AND VOLUMES
# ===================================================

networks:
  halal-bite-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local